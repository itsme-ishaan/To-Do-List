<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --gold: #ffcc00; }
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .header { margin-bottom: 30px; }
        
        /* Responsive Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .chart-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        h2 { color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Performance Analytics 📊</h1>
        <p>Welcome back, <b>{{ user_name }}</b>! Yahan aap apni progress dekh sakte hain.</p>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <h3>Task Status (Pending vs Completed)</h3>
            <canvas id="statusChart"></canvas>
        </div>

        <div class="chart-card">
            <h3>Task Priority Distribution</h3>
            <canvas id="priorityChart"></canvas>
        </div>
    </div>
</div>

<script>
    // Data Fetch karne ka function
    async function loadAnalytics() {
        const response = await fetch('/api/analytics/stats');
        const data = await response.json();

        // 1. Status Chart (Pie Chart)
        new Chart(document.getElementById('statusChart'), {
            type: 'pie',
            data: {
                labels: data.status.map(item => item.status),
                datasets: [{
                    data: data.status.map(item => item.count),
                    backgroundColor: ['#ff4444', '#00C851']
                }]
            },
            options: { responsive: true }
        });

        // 2. Priority Chart (Bar Chart)
        new Chart(document.getElementById('priorityChart'), {
            type: 'bar',
            data: {
                labels: data.priority.map(item => item.priority),
                datasets: [{
                    label: 'No. of Tasks',
                    data: data.priority.map(item => item.count),
                    backgroundColor: '#ffcc00'
                }]
            },
            options: { 
                responsive: true,
                scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } } }
            }
        });
    }

    loadAnalytics();
</script>
</body>
</html>
